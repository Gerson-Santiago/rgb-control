[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=70
    --strict-markers
    --maxfail=3
markers =
    unit: Testes unitários puros da camada Domain e Application sem mocks pesados
    integration: Testes integrados entre daemon logic, IO e file system
    gui: Testes de interface GTK4 e componentes visuais
    slow: Testes lentos end-to-end
asyncio_default_fixture_loop_scope = function
